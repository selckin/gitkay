name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: gitkay
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: gitkay

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libgraphene-1.0-dev libssl-dev pkg-config cmake

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Package binary
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          cd target/release
          tar czf "../../gitkay-${REF_NAME}-${{ matrix.target }}.tar.gz" gitkay

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: gitkay-${{ matrix.target }}
          path: gitkay-*-${{ matrix.target }}.tar.gz

  rpm:
    name: Build RPM
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: gitkay-x86_64-unknown-linux-gnu

      - name: Build RPM
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
          VERSION="${REF_NAME}"
          VERSION="${VERSION#v}"
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          mkdir -p gitkay-${VERSION}
          tar xzf "gitkay-${REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" -C gitkay-${VERSION}
          cp LICENSE README.md gitkay-${VERSION}/
          tar czf rpmbuild/SOURCES/gitkay-${VERSION}.tar.gz gitkay-${VERSION}
          cat > rpmbuild/SPECS/gitkay.spec << 'SPEC'
          Name:           gitkay
          Version:        VERSION_PLACEHOLDER
          Release:        1%{?dist}
          Summary:        A fast, native Wayland git history viewer
          License:        MIT
          URL:            https://github.com/Marenz/gitkay
          Source0:        gitkay-VERSION_PLACEHOLDER.tar.gz
          AutoReq:        no

          %description
          gitkay is a native Wayland git history viewer — gitk, but okay.

          %prep
          %autosetup

          %install
          install -Dm755 gitkay %{buildroot}%{_bindir}/gitkay

          %files
          %license LICENSE
          %doc README.md
          %{_bindir}/gitkay
          SPEC
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" rpmbuild/SPECS/gitkay.spec
          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/gitkay.spec

      - name: Upload RPM
        uses: actions/upload-artifact@v7
        with:
          name: gitkay-rpm
          path: rpmbuild/RPMS/**/*.rpm

  deb:
    name: Build deb
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: gitkay-x86_64-unknown-linux-gnu

      - name: Build deb
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME}"
          VERSION="${VERSION#v}"
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          tar xzf "gitkay-${REF_NAME}-x86_64-unknown-linux-gnu.tar.gz" -C pkg/usr/bin/
          chmod 755 pkg/usr/bin/gitkay
          cat > pkg/DEBIAN/control << EOF
          Package: gitkay
          Version: ${VERSION}
          Section: vcs
          Priority: optional
          Architecture: amd64
          Maintainer: Marenz <marenz@supradigital.org>
          Description: A fast, native Wayland git history viewer
           gitkay is a native Wayland git history viewer — gitk, but okay.
           Features commit graph, syntax-highlighted diffs, search, and
           Catppuccin Mocha dark theme. Built with Rust + egui.
          EOF
          dpkg-deb --build pkg gitkay_${VERSION}_amd64.deb

      - name: Upload deb
        uses: actions/upload-artifact@v7
        with:
          name: gitkay-deb
          path: "*.deb"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, rpm, deb]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          cp artifacts/gitkay-x86_64-unknown-linux-gnu/*.tar.gz release/
          cp artifacts/gitkay-aarch64-unknown-linux-gnu/*.tar.gz release/
          cp artifacts/gitkay-rpm/*/*.rpm release/
          cp artifacts/gitkay-deb/*.deb release/
          ls -la release/
          for ext in tar.gz rpm deb; do
            ls release/*."$ext" >/dev/null || { echo "::error::no .$ext artifact in release/"; exit 1; }
          done

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          gh release view "$REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$REF_NAME" --repo "$GITHUB_REPOSITORY" --notes ""
          gh release upload "$REF_NAME" release/* --repo "$GITHUB_REPOSITORY" --clobber
